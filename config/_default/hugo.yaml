title: Neeraj Patil
baseURL: 'https://YOUR_USERNAME.github.io/'

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

build:
  writeStats: true

enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10

enableEmoji: true
enableRobotsTXT: true

ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]

outputs:
  home: [HTML, RSS, headers, redirects]
  section: [HTML, RSS]

timeout: 600000

taxonomies:
  author: authors

markup:
  _default:
    highlight:
      lineNos: false

############################
# 🔥 CRITICAL HUGOBLOX MODULES (MISSING IN YOUR FILE)
############################

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify

  hugoVersion:
    extended: true
    min: "0.120.0"
